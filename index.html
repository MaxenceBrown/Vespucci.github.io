<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device=width, initial-scale=1.0">
<title>Vespucci Database</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel=stylesheet">
<style>
:root{
  --bg:#0d0d12;--surface:#13131a;--surface2:#1a1a24;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --accent:#7b6ef6;--accent2:#5b4fcf;
  --text:#f0f0f5;--muted:#8888a0;
  --danger:#f06060;--success#50c878;--gold:#f5c842;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);front-family:'DM Sans',sans-serif;min-height:100vh}
.noise{position:fixed;inset:0;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3cfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:0}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:1}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;width:min(380px,90vw);text-align:center}
.login-icon{width:56px;height:56px;background:rgba(123,110,246,.15);border:1px solid rgba(123,110,246,.3);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:24px}
.login-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:.4rem}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s;margin-bottom:12px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;padding:12px;border:none;border-radius:10px;cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--accent2)}
.login-err{font-size:12px;color:var(--danger);margin-top:8px;display:none}
#appShell{display:none;position:realtive;z-index:1}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:50}
.topbar-brand{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:rgba(123,110,246,.15);border:1px solid rgba(123,110,246,.25);color:var(--accent);font-family:'Syne',sans-serif;font-weight:600;margin-left:4px}
.main{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:2rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1rem 1.25rem}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'Syne',sans-serif;margin-bottom:4px}
.stat-val{font-size:24px;font-weight:500;font-family:'Syne',sans-serif}
</style></title>
</head>
